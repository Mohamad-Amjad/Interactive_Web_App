<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Recipe - Terra Kitchen</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link href="css/AddRecipe.css" rel="stylesheet">
</head>
<body>


    <div class="nav-header">
        <a href="Home.html" class="back-link">
            <i class="bi bi-arrow-left"></i> Back to Recipes
        </a>
    </div>

    <div class="main-wrapper">
        <div class="form-container">

            <div class="form-header">
                <h1 class="page-title">Add New Recipe</h1>
                <p class="page-subtitle">Share your culinary creation with the world</p>
            </div>
            <form>

                <h2 class="section-title">Basic Information</h2>

                <div class="form-group">
                    <label class="form-label">Recipe Title</label>
                    <input type="text" class="form-control custom-input" placeholder="e.g., Grandma's Apple Pie">
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea class="form-control custom-input" rows="3" placeholder="A brief description of your recipe..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Image URL</label>
                    <input type="text" class="form-control custom-input" placeholder="https://example.com/image.jpg">
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-6 col-md-3">
                        <label class="form-label">Prep Time (min)</label>
                        <input type="number" class="form-control custom-input" value="0">
                    </div>
                    <div class="col-6 col-md-3">
                        <label class="form-label">Cooking Time (min)</label>
                        <input type="number" class="form-control custom-input" value="0">
                    </div>
                    <div class="col-6 col-md-3 mt-3 mt-md-0">
                        <label class="form-label">Servings</label>
                        <input type="number" class="form-control custom-input" value="0">
                    </div>
                    <div class="col-6 col-md-3 mt-3 mt-md-0">
                        <label class="form-label">Difficulty</label>
                        <select class="form-select custom-input">
                            <option value="easy" selected>Easy</option>
                            <option value="medium">Medium</option>
                            <option value="hard">Hard</option>
                        </select>
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-12 col-md-6">
                        <label class="form-label">Category</label>
                        <input type="text" class="form-control custom-input" placeholder="e.g., Main Course, Dessert">
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">Cuisine</label>
                        <input type="text" class="form-control custom-input" placeholder="e.g., Italian, Mexican">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Tags (comma-separated)</label>
                    <input type="text" class="form-control custom-input" placeholder="e.g., quick, vegetarian, comfort-food">
                </div>

                <div class="d-flex justify-content-between align-items-center mb-2 mt-4">
                    <h2 class="section-title mb-0">Ingredients</h2>
                    <button type="button" id="btn-add-ingredient" class="btn btn-outline-custom btn-sm rounded-pill">+ Add Ingredient</button>
                </div>
                <div id="ingredients-container">
                    <div class="row g-2 mb-4 flex-nowrap ingredient-row">
                        <div class="col-7 pe-1">
                            <input type="text" class="form-control custom-input" placeholder="Ingredient name">
                        </div>
                        <div class="col-5 ps-1 d-flex gap-2">
                            <input type="text" class="form-control custom-input flex-grow-1" placeholder="Amount">
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-2 mt-4">
                    <h2 class="section-title mb-0">Instructions</h2>
                    <button type="button" id="btn-add-step" class="btn btn-outline-custom btn-sm rounded-pill">+ Add Step</button>
                </div>
                <div id="steps-container">
                    <div class="d-flex gap-3 mb-4 align-items-start instruction-step-row">
                        <div class="step-badge">1</div>
                        <textarea class="form-control custom-input flex-grow-1" rows="2" placeholder="Step 1 instructions"></textarea>
                    </div>
                </div>

                <div class="d-flex gap-3 pb-4">
                    <button type="submit" class="btn btn-primary-custom">Add Recipe</button>
                    <button type="button" class="btn btn-outline-custom cancel-btn" onclick="window.location.href='Home.html'" >Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/AddRecipe.js"></script>
</body>
</html>
